<!doctype html>
<html lang="vi"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TGBot · Đăng nhập</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <div class="b">T</div>
      <div>
        <div class="t1">TGBot · Auzastore</div>
        <div class="t2">Multi-bot platform</div>
      </div>
    </div>
    <h1 class="page" style="margin:22px 0 4px;font-size:24px">Đăng nhập</h1>
    <p class="page-sub" style="margin-bottom:22px">Truy cập bảng điều khiển bằng tài khoản admin hoặc seller.</p>

    <div class="tabs">
      <button id="tab-admin" class="active" type="button" onclick="setRole('admin')">
        <i class="i ic-shield sm"></i> Admin
      </button>
      <button id="tab-seller" type="button" onclick="setRole('seller')">
        <i class="i ic-store sm"></i> Seller
      </button>
    </div>

    <form id="f" onsubmit="return doLogin(event)">
      <label><i class="i ic-user sm" style="vertical-align:-2px"></i> Tên đăng nhập</label>
      <input id="u" autocomplete="username" required placeholder="admin"/>
      <label><i class="i ic-lock sm" style="vertical-align:-2px"></i> Mật khẩu</label>
      <input id="p" type="password" autocomplete="current-password" required placeholder="••••••••"/>
      <button class="primary" id="btn">
        Đăng nhập <i class="i ic-arrow-right sm"></i>
      </button>
      <div class="err" id="err"></div>
    </form>

    <p class="hint" style="text-align:center;margin-top:16px">
      <i class="i ic-info sm" style="vertical-align:-3px;background:var(--muted)"></i>
      Quên password? Đặt env <code>ADMIN_PASSWORD</code> trên server.
    </p>
  </div>
</div>
<script>
let role='admin';
function setRole(r){
  role=r;
  document.getElementById('tab-admin').classList.toggle('active',r==='admin');
  document.getElementById('tab-seller').classList.toggle('active',r==='seller');
}
async function doLogin(e){
  e.preventDefault();
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  err.textContent='';btn.disabled=true;btn.innerHTML='Đang đăng nhập…';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u.value,password:p.value,role})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Lỗi');
    localStorage.setItem('tg_token',d.token);
    localStorage.setItem('tg_role',d.role);
    localStorage.setItem('tg_user',d.username);
    location.href=d.role==='admin'?'/admin':'/seller';
  }catch(ex){
    err.textContent=ex.message;
  }finally{
    btn.disabled=false;btn.innerHTML='Đăng nhập <i class="i ic-arrow-right sm"></i>';
  }
  return false;
}
(async()=>{
  const t=localStorage.getItem('tg_token');if(!t)return;
  try{
    const r=await fetch('/api/me',{headers:{Authorization:'Bearer '+t}});
    if(r.ok){const d=await r.json();location.href=d.role==='admin'?'/admin':'/seller'}
  }catch{}
})();
</script>
</body></html>
